<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Facturas</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <!-- Title Bar -->
    <div class="title-bar">
      <div class="title-bar-drag">
        <span class="app-logo"></span>
        <span class="app-title">Scanner Facturas</span>
      </div>
      <div class="title-bar-controls">
        <button class="title-btn minimize" id="btn-minimize"></button>
        <button class="title-btn maximize" id="btn-maximize"></button>
        <button class="title-btn close" id="btn-close"></button>
      </div>
    </div>

    <!-- Backend status / error banner -->
    <div class="status-banner" id="status-banner">
      <span class="status-banner-dot"></span>
      <span id="status-banner-text"></span>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Left - Camera -->
      <div class="camera-section">
        <div class="section-label">
          <span>CAMARA</span>
          <button class="camera-select-btn" id="btn-select-camera">
            <span id="camera-select-label">AUTO</span>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
              <circle cx="12" cy="13" r="4"/>
            </svg>
          </button>
        </div>
        <div class="video-container">
          <canvas id="video-canvas" width="480" height="360"></canvas>
          <div class="camera-placeholder" id="camera-placeholder">
            <div class="camera-placeholder-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </div>
            <div class="camera-placeholder-text">Presiona INICIAR para comenzar</div>
          </div>
          <div class="scan-indicator" id="scan-indicator">
            <span class="scan-indicator-dot"></span>
            ESCANEANDO
          </div>
        </div>
        <div class="camera-controls">
          <button class="btn btn-primary" id="btn-start">INICIAR</button>
          <button class="btn btn-success" id="btn-upload" disabled>SUBIR A SIAT</button>
          <button class="btn btn-settings" id="btn-siat-settings" title="Configurar credenciales SIAT"></button>
          <button class="btn btn-test" id="btn-test-data">TEST</button>
        </div>
      </div>

      <!-- Right - Fields -->
      <div class="fields-section">
        <div class="section-label">DATOS ESCANEADOS</div>
        <div class="fields-card">
          <!-- NIT -->
          <div class="field-row">
            <label class="field-label">NIT</label>
            <div class="field-input-group">
              <input type="text" class="field-input" id="field-nit" value="---" readonly inputmode="numeric">
              <button class="btn-edit" id="btn-edit-nit">EDITAR</button>
            </div>
          </div>

          <!-- Numero de Factura -->
          <div class="field-row">
            <label class="field-label">No. FACTURA</label>
            <input type="text" class="field-input" id="field-factura" value="---" readonly>
          </div>

          <!-- Numero de Autorizacion -->
          <div class="field-row">
            <label class="field-label">No. AUTORIZACION</label>
            <input type="text" class="field-input" id="field-autorizacion" value="---" readonly>
          </div>

          <!-- Monto -->
          <div class="field-row">
            <label class="field-label">MONTO (BS.)</label>
            <input type="text" class="field-input" id="field-monto" value="---" inputmode="decimal">
          </div>

          <!-- Estado -->
          <div class="field-status" id="field-status">
            <span class="field-status-dot"></span>
            <span id="field-status-text">Esperando escaneo...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom - Company records -->
    <div class="history-section">
      <div class="company-tabs">
        <!-- TIGO oculto temporalmente: su QR trae otros campos distintos a
             los que parsea backend.py, hay que ajustar el parseo antes de
             volver a mostrarlo -->
        <button class="company-tab" id="tab-tigo" data-empresa="tigo" style="display:none">
          <span class="company-tab-name">TIGO</span>
          <span class="company-tab-logo">
            <img src="../assets/logo-tigo.png" alt="Tigo">
          </span>
        </button>
        <button class="company-tab selected" id="tab-entel" data-empresa="entel">
          <span class="company-tab-name">ENTEL</span>
          <span class="company-tab-logo">
            <img src="../assets/logo-entel.png" alt="Entel">
          </span>
        </button>
      </div>
      <div class="history-content">
        <div class="history-content-header">
          <span class="history-content-title" id="history-empresa-title">ENTEL</span>
          <span class="history-count" id="history-count">0</span>
        </div>
        <div class="history-list" id="history-list">
          <div class="history-empty">Sin registros</div>
        </div>
      </div>
    </div>

    <!-- Camera picker modal -->
    <div class="modal-overlay" id="camera-modal">
      <div class="modal-card">
        <div class="modal-header">
          <span>SELECCIONAR CAMARA</span>
          <button class="modal-close" id="camera-modal-close">&times;</button>
        </div>
        <div class="modal-body" id="camera-modal-body">
          <div class="camera-option camera-option-auto" data-index="auto">
            <div class="camera-option-thumb camera-option-thumb-auto">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
                <path d="M21 3v6h-6"/>
              </svg>
            </div>
            <span class="camera-option-label">Automatico</span>
          </div>
          <div class="modal-loading" id="camera-modal-loading">Buscando camaras disponibles...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- SIAT Credentials Modal -->
  <div class="modal-overlay" id="modal-siat" style="display:none">
    <div class="modal-card">
      <div class="modal-header">
        <span class="modal-title">Credenciales SIAT</span>
        <button class="modal-close" id="btn-modal-close"></button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="field-label">NIT / CI / CUR</label>
          <input type="text" class="field-input" id="siat-identity" placeholder="NIT, CI o CUR">
        </div>
        <div class="modal-field">
          <label class="field-label">Correo Electrónico</label>
          <input type="email" class="field-input" id="siat-email" placeholder="correo@ejemplo.com">
        </div>
        <div class="modal-field">
          <label class="field-label">Contraseña</label>
          <input type="password" class="field-input" id="siat-password" placeholder="Contraseña">
        </div>
      </div>
      <div class="modal-footer">
        <span class="modal-status" id="modal-status"></span>
        <button class="btn btn-primary" id="btn-modal-save">GUARDAR</button>
      </div>
    </div>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
